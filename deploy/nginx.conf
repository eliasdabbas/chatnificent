# Reference nginx site for the Chatnificent website.
#
# Install (run from the repo root on your local machine):
#
#   scp deploy/nginx.conf elias@172.233.209.115:/tmp/
#   ssh elias@172.233.209.115 \
#     'sudo install -m 0644 /tmp/nginx.conf /etc/nginx/sites-available/chatnificent \
#      && rm /tmp/nginx.conf \
#      && sudo ln -sf /etc/nginx/sites-available/chatnificent /etc/nginx/sites-enabled/chatnificent \
#      && sudo rm -f /etc/nginx/sites-enabled/default \
#      && sudo nginx -t \
#      && sudo systemctl reload nginx'
#
# Logs go to nginx defaults (/var/log/nginx/access.log, .error.log).
# logrotate already manages those via /etc/logrotate.d/nginx (weekly, 14 weeks, gz).

server {
    server_name chatnificent.com www.chatnificent.com 172.233.209.115 _;

    # Canonicalize www → apex on HTTPS.
    if ($host = www.chatnificent.com) {
        return 301 https://chatnificent.com$request_uri;
    }

    # Allow modest uploads (future file-upload features).
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:7777;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # nginx <-> uvicorn always speaks HTTP/1.1 (uvicorn doesn't accept h2 upstream).
        # The Connection: "" + http_version 1.1 combo enables keepalive + chunked streaming.
        proxy_http_version 1.1;
        proxy_set_header   Connection "";

        # Required for SSE / streaming responses to flush through nginx.
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/chatnificent.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/chatnificent.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}



server {
    if ($host = www.chatnificent.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = chatnificent.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    # Canonicalize bare-IP visitors onto the TLS-covered hostname.
    if ($host = 172.233.209.115) {
        return 301 https://chatnificent.com$request_uri;
    }

    listen 80 default_server;
    listen [::]:80 default_server;
    server_name chatnificent.com www.chatnificent.com 172.233.209.115 _;
    return 404; # managed by Certbot




}
